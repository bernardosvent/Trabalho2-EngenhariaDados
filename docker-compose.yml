version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-SqlServer@2024!}"
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-U", "sa", "-P", "${SA_PASSWORD:-SqlServer@2024!}", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net

  minio:
    image: minio/minio:RELEASE.2024-02-26T09-33-48Z
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - data-net

  # Serviço auxiliar para criar os buckets automaticamente
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/landing-zone;
      /usr/bin/mc mb myminio/bronze;
      exit 0;
      "
    networks:
      - data-net

volumes:
  minio_data:

networks:
  data-net:
